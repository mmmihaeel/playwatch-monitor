services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: playwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d playwatch']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg-data:/var/lib/postgresql

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/playwatch
      API_HOST: 0.0.0.0
      API_PORT: 4000
      API_TRUST_PROXY: false
      WEB_PORT: 3000
      WEB_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      WORKER_CONCURRENCY: 2
      CAPTURE_SCHEDULER_INTERVAL_MS: 10000
      SCREENSHOT_STORAGE_DRIVER: local
      SCREENSHOT_STORAGE_DIR: /workspace/data/screenshots
      STORAGE_PUBLIC_PATH: /assets/screenshots
      GOOGLE_PLAY_DEFAULT_REGION: US
      GOOGLE_PLAY_DEFAULT_LOCALE: en-US
      PG_BOSS_SCHEMA: pgboss
      PLAYWRIGHT_HEADLESS: true
      PLAYWRIGHT_TIMEOUT_MS: 60000
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        'bash',
        '-lc',
        'for attempt in {1..20}; do pnpm db:migrate && exit 0; echo \"Migration retry $${attempt}/20\"; sleep 2; done; exit 1'
      ]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/playwatch
      API_HOST: 0.0.0.0
      API_PORT: 4000
      API_TRUST_PROXY: false
      WEB_PORT: 3000
      WEB_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      WORKER_CONCURRENCY: 2
      CAPTURE_SCHEDULER_INTERVAL_MS: 10000
      SCREENSHOT_STORAGE_DRIVER: local
      SCREENSHOT_STORAGE_DIR: /workspace/data/screenshots
      STORAGE_PUBLIC_PATH: /assets/screenshots
      GOOGLE_PLAY_DEFAULT_REGION: US
      GOOGLE_PLAY_DEFAULT_LOCALE: en-US
      PG_BOSS_SCHEMA: pgboss
      PLAYWRIGHT_HEADLESS: true
      PLAYWRIGHT_TIMEOUT_MS: 60000
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./data/screenshots:/workspace/data/screenshots
    ports:
      - '4000:4000'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/playwatch
      API_HOST: 0.0.0.0
      API_PORT: 4000
      API_TRUST_PROXY: false
      WEB_PORT: 3000
      WEB_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      WORKER_CONCURRENCY: 2
      CAPTURE_SCHEDULER_INTERVAL_MS: 10000
      SCREENSHOT_STORAGE_DRIVER: local
      SCREENSHOT_STORAGE_DIR: /workspace/data/screenshots
      STORAGE_PUBLIC_PATH: /assets/screenshots
      GOOGLE_PLAY_DEFAULT_REGION: US
      GOOGLE_PLAY_DEFAULT_LOCALE: en-US
      PG_BOSS_SCHEMA: pgboss
      PLAYWRIGHT_HEADLESS: true
      PLAYWRIGHT_TIMEOUT_MS: 60000
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./data/screenshots:/workspace/data/screenshots

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    environment:
      PORT: 8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '3000:8080'

volumes:
  pg-data:
