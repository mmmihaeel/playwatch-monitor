name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment that holds deployment secrets and vars
        required: true
        default: production
        type: environment
      bootstrap_infrastructure:
        description: Create any missing GCP infrastructure before deploying
        required: true
        default: true
        type: boolean
      run_quality_gates:
        description: Run lint, typecheck, tests, and builds before pushing images
        required: true
        default: true
        type: boolean
      run_migrations:
        description: Execute the Cloud Run migration job before updating services
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-gcp-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  GCP_NETWORK: ${{ vars.GCP_NETWORK }}
  GCP_VM_SUBNET: ${{ vars.GCP_VM_SUBNET }}
  GCP_VM_SUBNET_CIDR: ${{ vars.GCP_VM_SUBNET_CIDR }}
  GCP_SERVERLESS_SUBNET: ${{ vars.GCP_SERVERLESS_SUBNET }}
  GCP_SERVERLESS_SUBNET_CIDR: ${{ vars.GCP_SERVERLESS_SUBNET_CIDR }}
  GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
  GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
  GCP_BUCKET_LOCATION: ${{ vars.GCP_BUCKET_LOCATION }}
  GCP_BUCKET_RETENTION_DAYS: ${{ vars.GCP_BUCKET_RETENTION_DAYS }}
  GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
  GCP_VM_MACHINE_TYPE: ${{ vars.GCP_VM_MACHINE_TYPE }}
  GCP_VM_TAG: ${{ vars.GCP_VM_TAG }}
  GCP_API_SERVICE_NAME: ${{ vars.GCP_API_SERVICE_NAME }}
  GCP_WEB_SERVICE_NAME: ${{ vars.GCP_WEB_SERVICE_NAME }}
  GCP_MIGRATE_JOB_NAME: ${{ vars.GCP_MIGRATE_JOB_NAME }}
  GCP_API_SERVICE_ACCOUNT: ${{ vars.GCP_API_SERVICE_ACCOUNT }}
  GCP_WEB_SERVICE_ACCOUNT: ${{ vars.GCP_WEB_SERVICE_ACCOUNT }}
  GCP_VM_SERVICE_ACCOUNT: ${{ vars.GCP_VM_SERVICE_ACCOUNT }}
  APP_DATABASE_NAME: ${{ vars.APP_DATABASE_NAME }}
  APP_DATABASE_USER: ${{ vars.APP_DATABASE_USER }}
  APP_PG_BOSS_SCHEMA: ${{ vars.APP_PG_BOSS_SCHEMA }}
  APP_GOOGLE_PLAY_DEFAULT_REGION: ${{ vars.APP_GOOGLE_PLAY_DEFAULT_REGION }}
  APP_GOOGLE_PLAY_DEFAULT_LOCALE: ${{ vars.APP_GOOGLE_PLAY_DEFAULT_LOCALE }}

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      api_image: ${{ steps.meta.outputs.api_image }}
      migrate_image: ${{ steps.meta.outputs.migrate_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      worker_image: ${{ steps.meta.outputs.worker_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            GCP_PROJECT_ID
            GCP_REGION
            GCP_ZONE
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required repository/environment variable: ${name}" >&2
              exit 1
            fi
          done

          if [[ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]]; then
            echo "Missing required secret: GCP_WORKLOAD_IDENTITY_PROVIDER" >&2
            exit 1
          fi

          if [[ -z "${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}" ]]; then
            echo "Missing required secret: GCP_DEPLOYER_SERVICE_ACCOUNT" >&2
            exit 1
          fi

          if [[ -z "${{ secrets.APP_DATABASE_PASSWORD }}" ]]; then
            echo "Missing required secret: APP_DATABASE_PASSWORD" >&2
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Enable Artifact Registry prerequisites
        shell: bash
        run: |
          set -euo pipefail

          repo="${GCP_ARTIFACT_REGISTRY_REPOSITORY:-playwatch}"

          gcloud services enable \
            artifactregistry.googleapis.com \
            cloudresourcemanager.googleapis.com \
            compute.googleapis.com \
            iap.googleapis.com \
            iam.googleapis.com \
            iamcredentials.googleapis.com \
            run.googleapis.com \
            storage.googleapis.com

          gcloud artifacts repositories describe "${repo}" \
            --location "${GCP_REGION}" >/dev/null 2>&1 || \
            gcloud artifacts repositories create "${repo}" \
              --location "${GCP_REGION}" \
              --repository-format docker \
              --description "PlayWatch production images"

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@v3

      - uses: pnpm/action-setup@v4
        if: ${{ inputs.run_quality_gates }}
        with:
          version: 10.17.1

      - uses: actions/setup-node@v4
        if: ${{ inputs.run_quality_gates }}
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: ${{ inputs.run_quality_gates }}
        run: pnpm install --frozen-lockfile

      - name: Run production quality gates
        if: ${{ inputs.run_quality_gates }}
        run: |
          pnpm audit --prod
          pnpm check

      - id: meta
        name: Compute image metadata
        shell: bash
        run: |
          set -euo pipefail

          repo="${GCP_ARTIFACT_REGISTRY_REPOSITORY:-playwatch}"
          short_sha="${GITHUB_SHA::12}"
          release_tag="sha-${short_sha}"
          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${repo}"

          {
            echo "release_tag=${release_tag}"
            echo "api_image=${registry}/api:${release_tag}"
            echo "migrate_image=${registry}/api-migrate:${release_tag}"
            echo "web_image=${registry}/web:${release_tag}"
            echo "worker_image=${registry}/worker:${release_tag}"
          } >>"${GITHUB_OUTPUT}"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.api_image }}
          cache-from: type=gha,scope=playwatch-api
          cache-to: type=gha,mode=max,scope=playwatch-api

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.migrate_image }}
          cache-from: type=gha,scope=playwatch-api-migrate
          cache-to: type=gha,mode=max,scope=playwatch-api-migrate

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=/api
          tags: ${{ steps.meta.outputs.web_image }}
          cache-from: type=gha,scope=playwatch-web
          cache-to: type=gha,mode=max,scope=playwatch-web

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.worker_image }}
          cache-from: type=gha,scope=playwatch-worker
          cache-to: type=gha,mode=max,scope=playwatch-worker

  deploy:
    name: Deploy infrastructure and services
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Run GCP deployment
        id: deploy
        shell: bash
        env:
          BOOTSTRAP_INFRASTRUCTURE: ${{ inputs.bootstrap_infrastructure }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          IMAGE_API: ${{ needs.build.outputs.api_image }}
          IMAGE_MIGRATE: ${{ needs.build.outputs.migrate_image }}
          IMAGE_WEB: ${{ needs.build.outputs.web_image }}
          IMAGE_WORKER: ${{ needs.build.outputs.worker_image }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          APP_DATABASE_PASSWORD: ${{ secrets.APP_DATABASE_PASSWORD }}
        run: bash deploy/gcp/scripts/deploy.sh

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## GCP deployment"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| Web Cloud Run URL | ${{ steps.deploy.outputs.web_service_url }} |"
            echo "| API Cloud Run URL | ${{ steps.deploy.outputs.api_service_url }} |"
            echo "| VM internal IP | \`${{ steps.deploy.outputs.vm_internal_ip }}\` |"
            echo "| Screenshot bucket | \`${{ steps.deploy.outputs.bucket_name }}\` |"
            echo "| Release tag | \`${{ needs.build.outputs.release_tag }}\` |"
          } >>"${GITHUB_STEP_SUMMARY}"
