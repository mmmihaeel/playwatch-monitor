upstream api_upstream {
  server ${API_UPSTREAM_HOST}:${API_UPSTREAM_PORT};
  keepalive 16;
}

server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; object-src 'none'; script-src 'self'; style-src 'self'" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location /api/ {
    proxy_http_version 1.1;
    proxy_pass ${API_UPSTREAM_SCHEME}://api_upstream/api/;
    proxy_set_header Host ${API_UPSTREAM_HOST};
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_name ${API_UPSTREAM_HOST};
    proxy_ssl_server_name on;
  }

  location /assets/screenshots/ {
    proxy_http_version 1.1;
    proxy_pass ${API_UPSTREAM_SCHEME}://api_upstream/assets/screenshots/;
    proxy_set_header Host ${API_UPSTREAM_HOST};
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_name ${API_UPSTREAM_HOST};
    proxy_ssl_server_name on;
  }

  location / {
    try_files $uri /index.html;
  }
}
