services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    command:
      [
        'postgres',
        '-c',
        'listen_addresses=*',
        '-c',
        'hba_file=/etc/postgresql/pg_hba.conf',
        '-c',
        'shared_buffers=${POSTGRES_SHARED_BUFFERS}',
        '-c',
        'max_connections=${POSTGRES_MAX_CONNECTIONS}',
        '-c',
        'work_mem=${POSTGRES_WORK_MEM}'
      ]
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  worker:
    image: ${WORKER_IMAGE}
    restart: unless-stopped
    init: true
    network_mode: host
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  migrate:
    image: ${MIGRATE_IMAGE}
    profiles:
      - ops
    restart: 'no'
    init: true
    network_mode: host
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', 'db:migrate']
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  postgres-data:
